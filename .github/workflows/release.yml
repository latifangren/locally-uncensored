name: Build & Release Desktop App

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.2.1)'
        required: true
        default: 'v1.3.0'

permissions:
  contents: write

# Third-party actions are pinned to a full commit SHA (not a moving tag) so a
# compromised or retagged upstream release can't run with our signing secrets
# in scope. This job has TAURI_SIGNING_PRIVATE_KEY in env — pinning matters most
# here. The trailing comment records the human-readable version.
jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
            rust_targets: ''
          - platform: windows-latest
            args: ''
            rust_targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Build from the release's target branch (master) instead of the tag ref.
          # Prevents shipping a stale snapshot when fixes land after tag creation
          # but before the release is published.
          ref: ${{ github.event.release.target_commitish || 'master' }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@51a9f1156b33df106d827c3a78f8f894946c5faa # v0.5.25
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.release.tag_name || github.event.inputs.tag || 'v1.3.0' }}
          releaseName: 'Locally Uncensored ${{ github.event.release.tag_name || github.event.inputs.tag }}'
          releaseBody: |
            ## Download

            **Windows:** Download the `.exe` installer. During setup, choose "Install for current user only" for a portable/no-install experience. Or use the `.msi` for system-wide installation.

            **macOS:** Download the `.dmg` and drag the app to any folder.

            **Linux:** Download the `.AppImage`, make it executable (`chmod +x`), and run. No installation needed.

            > All versions are portable-friendly — no admin rights required.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
